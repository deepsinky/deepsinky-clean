
<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSINKY</title>
<link rel="stylesheet" href="style.css">
<style>

body{
margin:0;
font-family:Arial;
background:#202123;
color:white;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

.header{
display:flex;
align-items:center;
justify-content:center;
padding:15px;
border-bottom:1px solid #333;
font-size:18px;
}

.brand{
display:flex;
align-items:center;
gap:8px;
}

.logo{
width:28px;
height:28px;
}

.center{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.center h1{
font-size:28px;
margin-bottom:30px;
}

.options{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.option{
padding:12px 20px;
border-radius:25px;
border:1px solid #444;
cursor:pointer;
}

.option:hover{
background:#2a2b32;
}

.chat{
flex:1;
overflow-y:auto;
padding:20px;
display:none;
}

.message{
padding:10px 15px;
margin:10px 0;
border-radius:10px;
max-width:70%;
}

.user{
background:#444;
margin-left:auto;
}

.bot{
background:#333;
}

.input-area{
display:flex;
padding:15px;
border-top:1px solid #333;
background:#202123;
}

input{
flex:1;
padding:15px;
border-radius:25px;
border:none;
background:#40414f;
color:white;
outline:none;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
border-radius:25px;
background:#19c37d;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<div class="menu-circle" onclick="toggleSidebar()">
  <span></span>
  <span></span>
</div>
<div class="brand">
<img src="logo.png" class="logo">
<span>DeepSINKY</span>
</div>

</div>
  <div class="sidebar" id="sidebar">

<input class="search" placeholder="Search">

<div class="side-item">New chat</div>
<div class="side-item">Images</div>
<div class="side-item">Apps</div>

</div>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="center" id="welcome">

<h1>How can I be of help?</h1>

<div class="options">

<div class="option">Create image</div>
<div class="option">Get advice</div>
<div class="option">Summarize text</div>
<div class="option">Make a plan</div>

</div>

</div>

<div class="chat" id="chat"></div>

<div class="input-area">

<input id="input" placeholder="Ask DeepSINKY">

<button onclick="send()">Send</button>

</div>

<script>
<script src="script.js"></script>
</body>
</html>
